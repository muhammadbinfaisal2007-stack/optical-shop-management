<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings — Optical Shop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="topbar">
        <h1>Optical Shop Management</h1>
        <div class="user-info">
            <span id="welcomeMsg"></span>
            <button id="logoutBtn">Log Out</button>
        </div>
    </header>

    <nav class="sidebar" id="sidebar"></nav>

    <main class="content">
        <h2>Settings</h2>

        <div class="form-card">
            <form id="settingsForm">
                <label>Shop Name (shown on invoices)</label>
                <input type="text" name="shop_name" required>

                <label>Invoice Footer Text</label>
                <input type="text" name="invoice_footer_text">

                <div class="form-row">
                    <div>
                        <label>Tax Rate (%)</label>
                        <input type="number" name="tax_percent" min="0" max="100" step="0.5" required>
                    </div>
                    <div>
                        <label>Idle Logout Timeout (minutes)</label>
                        <input type="number" name="idle_timeout_minutes" min="1" max="480" required>
                    </div>
                </div>
                <p class="hint">If no one uses the app for this many minutes, they'll be automatically logged out — useful for an unattended shop counter.</p>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Settings</button>
                </div>
            </form>
            <p id="settingsError" class="error-msg"></p>
            <p id="settingsSuccess" class="success-msg"></p>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/settings.js"></script>
</body>
</html>
